<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff758c, #ff7eb3);
      background-size: 400% 400%;
      animation: bgMove 12s ease infinite;
      transition: 0.4s;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 100%;
      max-width: 650px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      transition: 0.4s;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 32px;
      color: #222;
    }

    .theme-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      background: #222;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.25s;
    }

    .theme-btn:hover {
      transform: scale(1.05);
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    #taskInput {
      flex: 1;
      min-width: 220px;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
    }

    #taskInput:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 8px rgba(108, 99, 255, 0.25);
    }

    .add-btn {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #6c63ff, #4f46e5);
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.25s;
    }

    .add-btn:hover {
      transform: scale(1.05);
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      font-weight: bold;
      color: #333;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .filter-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      background: #e5e7eb;
      color: #222;
      font-weight: bold;
      transition: 0.25s;
    }

    .filter-btn:hover {
      transform: translateY(-1px);
    }

    .filter-btn.active {
      background: #6c63ff;
      color: white;
    }

    ul {
      list-style: none;
    }

    li {
      background: #f4f4f8;
      border-left: 6px solid #6c63ff;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: 0.25s;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    li:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
    }

    .task-text {
      flex: 1;
      font-size: 17px;
      color: #222;
      word-break: break-word;
    }

    li.completed {
      border-left-color: #22c55e;
      opacity: 0.8;
    }

    li.completed .task-text {
      text-decoration: line-through;
      color: gray;
    }

    .task-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .task-buttons button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .task-buttons button:hover {
      transform: scale(1.05);
    }

    .complete-btn {
      background: #22c55e;
    }

    .edit-btn {
      background: #f59e0b;
    }

    .delete-btn {
      background: #ef4444;
    }

    .empty {
      text-align: center;
      color: #666;
      margin-top: 8px;
      font-size: 15px;
    }

    body.dark {
      background: linear-gradient(-45deg, #0f172a, #1e293b, #111827, #334155);
      background-size: 400% 400%;
    }

    body.dark .container {
      background: rgba(18, 24, 33, 0.95);
    }

    body.dark h1,
    body.dark .info-bar,
    body.dark .empty,
    body.dark .task-text {
      color: #f3f4f6;
    }

    body.dark #taskInput {
      background: #1f2937;
      color: white;
      border-color: #374151;
    }

    body.dark li {
      background: #1f2937;
    }

    body.dark .filter-btn {
      background: #374151;
      color: #f3f4f6;
    }

    body.dark .filter-btn.active {
      background: #6c63ff;
      color: white;
    }

    body.dark .theme-btn {
      background: #f3f4f6;
      color: #111827;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 26px;
      }

      li {
        flex-direction: column;
        align-items: stretch;
      }

      .task-buttons {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>✨ Yapılacaklar Pro</h1>
      <button class="theme-btn" onclick="toggleTheme()">🌙 Mod</button>
    </div>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Bir görev yaz..." />
      <button class="add-btn" onclick="addTask()">Ekle</button>
    </div>

    <div class="info-bar">
      <span id="taskCount">Toplam görev: 0</span>
      <span id="completedCount">Biten: 0</span>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all')">Tümü</button>
      <button class="filter-btn" onclick="setFilter('active')">Aktif</button>
      <button class="filter-btn" onclick="setFilter('completed')">Tamamlanan</button>
    </div>

    <ul id="taskList"></ul>
    <p id="emptyMessage" class="empty">Henüz görev eklenmedi.</p>
  </div>

  <script>
    const taskInput = document.getElementById("taskInput");
    const taskList = document.getElementById("taskList");
    const emptyMessage = document.getElementById("emptyMessage");
    const taskCount = document.getElementById("taskCount");
    const completedCount = document.getElementById("completedCount");
    const filterButtons = document.querySelectorAll(".filter-btn");

    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let darkMode = JSON.parse(localStorage.getItem("darkMode")) || false;
    let currentFilter = localStorage.getItem("currentFilter") || "all";

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function saveTheme() {
      localStorage.setItem("darkMode", JSON.stringify(darkMode));
    }

    function saveFilter() {
      localStorage.setItem("currentFilter", currentFilter);
    }

    function updateCounts() {
      taskCount.textContent = "Toplam görev: " + tasks.length;
      const completed = tasks.filter(task => task.completed).length;
      completedCount.textContent = "Biten: " + completed;
    }

    function getFilteredTasks() {
      if (currentFilter === "active") {
        return tasks.filter(task => !task.completed);
      }
      if (currentFilter === "completed") {
        return tasks.filter(task => task.completed);
      }
      return tasks;
    }

    function updateEmptyMessage(filteredTasks) {
      if (filteredTasks.length === 0) {
        if (tasks.length === 0) {
          emptyMessage.textContent = "Henüz görev eklenmedi.";
        } else {
          emptyMessage.textContent = "Bu filtrede gösterilecek görev yok.";
        }
        emptyMessage.style.display = "block";
      } else {
        emptyMessage.style.display = "none";
      }
    }

    function renderTasks() {
      taskList.innerHTML = "";
      const filteredTasks = getFilteredTasks();

      filteredTasks.forEach(task => {
        const realIndex = tasks.indexOf(task);

        const li = document.createElement("li");
        if (task.completed) {
          li.classList.add("completed");
        }

        const span = document.createElement("span");
        span.className = "task-text";
        span.textContent = task.text;

        const buttonArea = document.createElement("div");
        buttonArea.className = "task-buttons";

        const completeBtn = document.createElement("button");
        completeBtn.textContent = "Bitti";
        completeBtn.className = "complete-btn";
        completeBtn.onclick = function () {
          tasks[realIndex].completed = !tasks[realIndex].completed;
          saveTasks();
          renderTasks();
        };

        const editBtn = document.createElement("button");
        editBtn.textContent = "Düzenle";
        editBtn.className = "edit-btn";
        editBtn.onclick = function () {
          const newText = prompt("Görevi düzenle:", tasks[realIndex].text);
          if (newText !== null) {
            const trimmedText = newText.trim();
            if (trimmedText !== "") {
              tasks[realIndex].text = trimmedText;
              saveTasks();
              renderTasks();
            }
          }
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Sil";
        deleteBtn.className = "delete-btn";
        deleteBtn.onclick = function () {
          tasks.splice(realIndex, 1);
          saveTasks();
          renderTasks();
        };

        buttonArea.appendChild(completeBtn);
        buttonArea.appendChild(editBtn);
        buttonArea.appendChild(deleteBtn);

        li.appendChild(span);
        li.appendChild(buttonArea);

        taskList.appendChild(li);
      });

      updateCounts();
      updateEmptyMessage(filteredTasks);
      updateActiveFilterButton();
    }

    function addTask() {
      const text = taskInput.value.trim();

      if (text === "") {
        alert("Lütfen bir görev yaz.");
        return;
      }

      tasks.push({
        text: text,
        completed: false
      });

      saveTasks();
      renderTasks();
      taskInput.value = "";
      taskInput.focus();
    }

    taskInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        addTask();
      }
    });

    function toggleTheme() {
      darkMode = !darkMode;
      document.body.classList.toggle("dark");
      saveTheme();
    }

    function setFilter(filter) {
      currentFilter = filter;
      saveFilter();
      renderTasks();
    }

    function updateActiveFilterButton() {
      filterButtons.forEach(button => {
        button.classList.remove("active");
      });

      if (currentFilter === "all") {
        filterButtons[0].classList.add("active");
      } else if (currentFilter === "active") {
        filterButtons[1].classList.add("active");
      } else if (currentFilter === "completed") {
        filterButtons[2].classList.add("active");
      }
    }

    if (darkMode) {
      document.body.classList.add("dark");
    }

    renderTasks();
  </script>
</body>
</html>
